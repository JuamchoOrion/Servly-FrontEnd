<!-- Contenedor principal de accesibilidad GLOBAL -->
<div class="accessibility-container">
  <!-- Botón flotante de accesibilidad -->
  <button
    class="accessibility-toggle"
    (click)="toggleMenu()"
    aria-label="Abrir menú de accesibilidad"
    title="Configuración de Accesibilidad"
    [attr.aria-expanded]="isOpen"
    aria-controls="accessibility-panel"
  >
    <svg class="toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
      <!-- Ojo principal -->
      <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <!-- Iris -->
      <circle cx="12" cy="12" r="5.5" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <!-- Pupila -->
      <circle cx="12" cy="12" r="3" fill="currentColor"/>
      <!-- Destello en la pupila (representa claridad/visibilidad) -->
      <circle cx="13.5" cy="10.5" r="1" fill="currentColor" opacity="0.6"/>
      <!-- Línea de accesibilidad - símbolo de inclusión -->
      <path d="M 7 18 Q 12 20 17 18" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Panel desplegable de accesibilidad -->
  <div
    *ngIf="isOpen"
    class="accessibility-menu"
    role="dialog"
    id="accessibility-panel"
    aria-label="Panel de configuración de accesibilidad"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="menu-header">
      <h2 class="menu-title">⚙️ Accesibilidad</h2>
      <button
        (click)="closeMenu()"
        class="close-btn"
        aria-label="Cerrar menú"
        title="Cerrar (Esc)"
      >
        ✕
      </button>
    </div>

    <!-- Divider -->
    <div class="menu-divider"></div>

    <!-- Contenido -->
    <div class="menu-content">

      <!-- Modo Oscuro -->
      <div class="setting-group">
        <div class="setting-label-row">
          <label for="dark-mode" class="setting-label">🌙 Modo Oscuro</label>
        </div>
        <label class="toggle-switch">
          <input
            id="dark-mode"
            type="checkbox"
            [checked]="settings.darkMode"
            (change)="toggleDarkMode()"
            aria-label="Activar o desactivar modo oscuro"
          />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Tamaño de Letra -->
      <div class="setting-group">
        <label for="font-size" class="setting-label">📝 Tamaño de Letra</label>
        <select
          id="font-size"
          [value]="settings.fontSize"
          (change)="updateFontSize($any($event).target.value)"
          class="font-select"
          aria-label="Seleccionar tamaño de letra"
        >
          <option *ngFor="let option of fontSizeOptions" [value]="option.value">
            {{ option.label }}
          </option>
        </select>
      </div>

      <!-- Alto Contraste -->
      <div class="setting-group">
        <div class="setting-label-row">
          <label for="high-contrast" class="setting-label">👁️ Alto Contraste</label>
        </div>
        <label class="toggle-switch">
          <input
            id="high-contrast"
            type="checkbox"
            [checked]="settings.highContrast"
            (change)="toggleHighContrast()"
            aria-label="Activar o desactivar alto contraste"
          />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Reducir Movimiento -->
      <div class="setting-group">
        <div class="setting-label-row">
          <label for="reduce-motion" class="setting-label">⏸️ Reducir Movimiento</label>
        </div>
        <label class="toggle-switch">
          <input
            id="reduce-motion"
            type="checkbox"
            [checked]="settings.reduceMotion"
            (change)="toggleReduceMotion()"
            aria-label="Activar o desactivar reducción de movimiento"
          />
          <span class="toggle-slider"></span>
        </label>
      </div>

    </div>

    <!-- Divider -->
    <div class="menu-divider"></div>

    <!-- Footer con botón reset -->
    <div class="menu-footer">
      <button class="reset-btn" (click)="resetSettings()" title="Restablecer configuración a valores por defecto">
        ↺ Restablecer
      </button>
    </div>
  </div>
</div>
