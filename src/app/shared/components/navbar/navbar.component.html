<nav class="main-navbar">
  <!-- Mobile Menu Toggle (visible only on mobile) -->
  <button class="mobile-menu-btn" *ngIf="isAuthenticated" (click)="toggleMobileMenu()">
    <span class="material-icons">{{ mobileMenuOpen ? 'close' : 'menu' }}</span>
  </button>

  <!-- Left Section: Logo + Nav Items -->
  <div class="navbar-left">
    <!-- Logo -->
    <div class="navbar-logo">
      <span class="logo-text">Servly</span>
    </div>

    <!-- Nav Items (Desktop only) -->
    <div class="nav-items desktop-only" *ngIf="isAuthenticated">
      <a
        *ngFor="let item of visibleNavItems"
        [routerLink]="item.route"
        [routerLinkActive]="['active']"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
        (click)="closeDropdown()">
        <span class="material-icons nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </div>
  </div>

  <!-- Right Section: Brand + User Menu -->
  <div class="navbar-right">
    <!-- Brand -->
    <div class="navbar-brand">
      <span class="brand-text">SERVLY - Gestión</span>
    </div>

    <!-- User Section -->
    <div class="user-section" *ngIf="isAuthenticated" appClickOutside (clickOutside)="closeDropdown()">
      <button class="user-btn" (click)="toggleDropdown()">
        <span class="material-icons user-icon">account_circle</span>
        <span class="user-email">{{ userEmail }}</span>
        <span class="material-icons dropdown-arrow" [class.open]="dropdownOpen">expand_more</span>
      </button>

      <!-- Dropdown Menu -->
      <div class="user-dropdown" *ngIf="dropdownOpen">
        <div class="dropdown-header">
          <span class="role-badge">{{ userRole }}</span>
        </div>
        <a routerLink="/profile" class="dropdown-item" (click)="closeDropdown()">
          <span class="material-icons">account_circle</span>
          <span>Mi Perfil</span>
        </a>
        <a routerLink="/dashboard" class="dropdown-item" (click)="closeDropdown()">
          <span class="material-icons">dashboard</span>
          <span>Dashboard</span>
        </a>
        <button class="dropdown-item logout-btn" (click)="logout()">
          <span class="material-icons">logout</span>
          <span>Cerrar Sesión</span>
        </button>
      </div>
    </div>

    <!-- Login Button (No authenticated) -->
    <a
      *ngIf="!isAuthenticated"
      routerLink="/login"
      class="login-btn">
      <span>Iniciar Sesión</span>
    </a>
  </div>
</nav>

<!-- Mobile Menu Overlay -->
<div class="mobile-menu-overlay" *ngIf="mobileMenuOpen && isAuthenticated" (click)="closeMobileMenu()"></div>

<!-- Mobile Menu Panel -->
<div class="mobile-menu" [class.open]="mobileMenuOpen" *ngIf="isAuthenticated">
  <div class="mobile-menu-header">
    <span class="mobile-menu-title">Menú</span>
    <button class="mobile-menu-close" (click)="closeMobileMenu()">
      <span class="material-icons">close</span>
    </button>
  </div>

  <div class="mobile-menu-content">
    <a
      *ngFor="let item of visibleNavItems"
      [routerLink]="item.route"
      [routerLinkActive]="['active']"
      class="mobile-nav-item"
      (click)="onNavItemClick()">
      <span class="material-icons">{{ item.icon }}</span>
      <span>{{ item.label }}</span>
    </a>
  </div>

  <div class="mobile-menu-footer">
    <div class="mobile-user-info">
      <span class="material-icons">account_circle</span>
      <div class="user-details">
        <span class="user-email-mobile">{{ userEmail }}</span>
        <span class="user-role-mobile">{{ userRole }}</span>
      </div>
    </div>
    <button class="mobile-logout-btn" (click)="logout()">
      <span class="material-icons">logout</span>
      <span>Cerrar Sesión</span>
    </button>
  </div>
</div>
