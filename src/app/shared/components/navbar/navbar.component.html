<nav class="main-navbar">
  <!-- Left Section: Logo + Nav Items -->
  <div class="navbar-left">
    <!-- Logo -->
    <div class="navbar-logo">
      <span class="logo-text">Servly</span>
    </div>

    <!-- Nav Items (Desktop) -->
    <div class="nav-items" *ngIf="isAuthenticated">
      <a
        *ngFor="let item of visibleNavItems"
        [routerLink]="item.route"
        class="nav-item"
        (click)="closeDropdown()">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </div>
  </div>

  <!-- Right Section: Brand + User Menu -->
  <div class="navbar-right">
    <!-- Brand -->
    <div class="navbar-brand">
      <span class="brand-text">SERVLY - Gestión</span>
    </div>

    <!-- User Section -->
    <div class="user-section" *ngIf="isAuthenticated" appClickOutside (clickOutside)="closeDropdown()">
      <button class="user-btn" (click)="toggleDropdown()">
        <svg class="user-icon" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
        <span class="user-email">{{ userEmail }}</span>
        <svg class="dropdown-arrow" [class.open]="dropdownOpen" viewBox="0 0 24 24">
          <path d="M7 10l5 5 5-5z"/>
        </svg>
      </button>

      <!-- Dropdown Menu -->
      <div class="user-dropdown" *ngIf="dropdownOpen">
        <div class="dropdown-header">
          <span class="role-badge">{{ userRole }}</span>
        </div>
        <a routerLink="/dashboard" class="dropdown-item" (click)="closeDropdown()">
          <span>📊 Dashboard</span>
        </a>
        <button class="dropdown-item logout-btn" (click)="logout()">
          <span>🚪 Cerrar Sesión</span>
        </button>
      </div>
    </div>

    <!-- Login Button (No authenticated) -->
    <a
      *ngIf="!isAuthenticated"
      routerLink="/login"
      class="login-btn">
      <span>Iniciar Sesión</span>
    </a>
  </div>

  <!-- Mobile Menu Toggle -->
  <button class="mobile-menu-btn" *ngIf="isAuthenticated" (click)="toggleDropdown()">
    <svg viewBox="0 0 24 24">
      <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
    </svg>
  </button>
</nav>
