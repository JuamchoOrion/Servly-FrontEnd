<div class="login-wrapper">
  <div class="login-container">
    <!-- Header -->
    <div class="login-header">
      <h1 class="login-title">Servly</h1>
      <p class="login-subtitle">Sistema de Gestión para Restaurantes</p>
    </div>

    <!-- Formulario -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <!-- Email -->
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input
          id="email"
          type="email"
          class="form-input"
          [class.error]="emailControl?.invalid && emailControl?.touched"
          placeholder="tu@correo.com"
          formControlName="email"
          (blur)="emailControl?.markAsTouched()">
        <span class="error-text" *ngIf="emailControl?.invalid && emailControl?.touched">
          {{ getEmailError() }}
        </span>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <div class="password-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            class="form-input"
            [class.error]="passwordControl?.invalid && passwordControl?.touched"
            placeholder="••••••••"
            formControlName="password"
            (blur)="passwordControl?.markAsTouched()">
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            <span *ngIf="!showPassword">👁️</span>
            <span *ngIf="showPassword">👁️‍🗨️</span>
          </button>
        </div>
        <span class="error-text" *ngIf="passwordControl?.invalid && passwordControl?.touched">
          {{ getPasswordError() }}
        </span>
      </div>

      <!-- reCAPTCHA -->
      <div class="recaptcha-wrapper">
        <div #recaptchaContainer class="g-recaptcha" [attr.data-sitekey]="recaptchaSiteKey"></div>
      </div>

      <!-- Error General -->
      <div class="error-alert" *ngIf="loginError">
        {{ loginError }}
      </div>

      <!-- Botones -->
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="isLoading || loginForm.invalid">
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading">Conectando...</span>
      </button>

      <button
        type="button"
        class="btn btn-google"
        (click)="loginWithGoogle()"
        [disabled]="isLoading">
        <svg class="google-logo" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span>Continuar con Google</span>
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p>¿Problemas para iniciar sesión? <a href="#">Contactar soporte</a></p>
    </div>
  </div>
</div>

<!-- Script de reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
