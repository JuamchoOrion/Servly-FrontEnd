<div class="login-wrapper">
  <div class="login-container">
    <!-- Header -->
    <div class="login-header">
      <h1 class="login-title">Servly</h1>
      <p class="login-subtitle">Sistema de Gestión para Restaurantes</p>
    </div>

    <!-- Formulario -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <!-- Email -->
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input
          id="email"
          type="email"
          class="form-input"
          [class.error]="emailControl?.invalid && emailControl?.touched"
          placeholder="tu@correo.com"
          formControlName="email"
          (blur)="emailControl?.markAsTouched()">
        <span class="error-text" *ngIf="emailControl?.invalid && emailControl?.touched">
          {{ getEmailError() }}
        </span>
      </div>

      <!-- Contraseña -->
      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <div class="password-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            class="form-input"
            [class.error]="passwordControl?.invalid && passwordControl?.touched"
            placeholder="••••••••"
            formControlName="password"
            (blur)="passwordControl?.markAsTouched()">
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            <span *ngIf="!showPassword">👁️</span>
            <span *ngIf="showPassword">👁️‍🗨️</span>
          </button>
        </div>
        <span class="error-text" *ngIf="passwordControl?.invalid && passwordControl?.touched">
          {{ getPasswordError() }}
        </span>
      </div>

      <!-- reCAPTCHA -->
      <div class="recaptcha-wrapper">
        <div #recaptchaContainer class="g-recaptcha" [attr.data-sitekey]="recaptchaSiteKey"></div>
      </div>

      <!-- Error General -->
      <div class="error-alert" *ngIf="loginError">
        {{ loginError }}
      </div>

      <!-- Botones -->
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="isLoading || loginForm.invalid">
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading">Conectando...</span>
      </button>

      <!-- Google Sign-In Button (renderizado automáticamente por Google) -->
      <div id="google-login-button" class="google-button-container"></div>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p>¿Problemas para iniciar sesión? <a href="#">Contactar soporte</a></p>
    </div>
  </div>
</div>

<!-- Script de reCAPTCHA -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
